    <!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Five Star Restaurant</title>
<style>
    /* Reset & base */
    * {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
    body {background:#fff8f0;color:#333;}

    /* Header */
    header {background:#d35400;color:white;padding:20px;text-align:center;}
    header h1 {font-size:2.5rem;margin-bottom:10px;}
    header p {font-size:1.1rem;}
    .call-btn {
        display:inline-block;
        margin-top:10px;
        padding:10px 20px;
        background:#e74c3c;
        color:white;
        text-decoration:none;
        font-weight:bold;
        border-radius:5px;
        transition:0.3s;
    }
    .call-btn:hover {background:#c0392b;}

    /* Main Section */
    main {padding:50px 20px;max-width:1000px;margin:auto;}
    section {margin-bottom:50px;}
    h2 {color:#d35400;margin-bottom:20px;font-size:2rem;text-align:center;}
    
    /* Menu */
    .menu {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
    .menu-item {border:1px solid #ddd;padding:20px;border-radius:10px;text-align:center;transition:0.3s;}
    .menu-item:hover {transform:scale(1.05);box-shadow:0 5px 15px rgba(0,0,0,0.2);}
    .menu-item h3 {margin-bottom:10px;color:#e67e22;}
    .menu-item p {font-size:0.9rem;color:#555;}
    .menu-item span {display:block;margin-top:10px;font-weight:bold;color:#d35400;}

    /* Reservation Form */
    form {max-width:600px;margin:auto;background:#f9f9f9;padding:30px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
    form label {display:block;margin-bottom:5px;font-weight:bold;}
    form input, form textarea {width:100%;padding:10px;margin-bottom:20px;border:1px solid #ccc;border-radius:5px;}
    form button {padding:12px 20px;background:#e74c3c;color:white;border:none;border-radius:5px;font-size:1rem;cursor:pointer;transition:0.3s;}
    form button:hover {background:#c0392b;}
    .success-message {text-align:center;color:green;font-weight:bold;margin-top:10px;}

    /* Footer */
    footer {background:#2c3e50;color:white;padding:20px;text-align:center;}
    footer p {margin:5px 0;}
</style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5PN74NVF"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<header>
    <h1>Five Star Restaurant</h1>
    <p>Experience the finest dining with exceptional flavors</p>
    <a href="tel:+1234567890" class="call-btn">Call Now</a>
</header>

<main>
    <!-- Menu Section -->
    <section id="menu">
        <h2>Our Signature Menu</h2>
        <div class="menu">
            <div class="menu-item">
                <h3>Grilled Salmon</h3>
                <p>Fresh Atlantic salmon grilled to perfection with lemon butter sauce.</p>
                <span>$25</span>
            </div>
            <div class="menu-item">
                <h3>Ribeye Steak</h3>
                <p>Juicy ribeye steak served with garlic mashed potatoes and vegetables.</p>
                <span>$30</span>
            </div>
            <div class="menu-item">
                <h3>Vegetarian Pasta</h3>
                <p>Homemade pasta with seasonal vegetables in a creamy tomato sauce.</p>
                <span>$18</span>
            </div>
            <div class="menu-item">
                <h3>Chocolate Lava Cake</h3>
                <p>Decadent chocolate cake with molten center, served warm with ice cream.</p>
                <span>$10</span>
            </div>
        </div>
    </section>

    <!-- Reservation Form -->
    <section id="reservation">
        <h2>Book a Table</h2>
        <form id="reservationForm">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="date">Reservation Date</label>
            <input type="date" id="date" name="date" required>

            <label for="message">Special Requests</label>
            <textarea id="message" name="message" rows="4"></textarea>

            <button type="submit">Submit Reservation</button>
            <div class="success-message" id="successMessage"></div>
        </form>
    </section>
</main>

<footer>
    <p>© 2026 Five Star Restaurant. All Rights Reserved.</p>
    <p>Follow us on social media: Facebook | Instagram | Twitter</p>
</footer>

<script>
    // Form submission
    document.getElementById('reservationForm').addEventListener('submit', function(e){
        e.preventDefault();
        
        // Get form data
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const date = document.getElementById('date').value;
        const message = document.getElementById('message').value;

        // Display success message
        const success = document.getElementById('successMessage');
        success.textContent = `Thank you, ${name}! Your reservation for ${date} has been received.`;

        // Clear form
        this.reset();

        // Here you can also add AJAX to send data to server
        console.log({name, email, phone, date, message});
    });
</script>

</body>
</html>
