<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie's Delight</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ffecd2, #fcb69f);
    }

    header {
        background: #ff6b6b;
        padding: 15px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    nav a {
        color: white;
        margin: 0 15px;
        text-decoration: none;
        font-weight: bold;
        cursor: pointer;
    }

    .container {
        padding: 20px;
    }

    .food-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        overflow: hidden;
        transition: transform 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
    }

    .card-content {
        padding: 15px;
        text-align: center;
    }

    button {
        background: #ff6b6b;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #ff4757;
    }

    #cart-count {
        background: white;
        color: #ff6b6b;
        padding: 3px 8px;
        border-radius: 50%;
        margin-left: 5px;
    }

    .feedback {
        background: white;
        padding: 20px;
        margin-top: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    footer {
        background: #ff6b6b;
        color: white;
        text-align: center;
        padding: 10px;
        margin-top: 20px;
    }
</style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5PN74NVF"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<header>
    <h2>Foodie's Delight</h2>
    <nav>
        <a onclick="scrollToSection('home')">Home</a>
        <a onclick="scrollToSection('contact')">Contact Us</a>
        <a href="tel:+911234567890">Call Now</a>
        <a>Cart <span id="cart-count">0</span></a>
    </nav>
</header>

<div class="container" id="home">
    <h2>Our Delicious Menu</h2>
    <div class="food-grid" id="food-items"></div>

    <div class="feedback" id="contact">
        <h3>Feedback Form</h3>
        <form onsubmit="submitFeedback(event)">
            <textarea id="feedbackText" placeholder="Write your feedback..." required></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>
</div>

<footer>
    © 2026 Foodie's Delight | Designed with ❤️
</footer>

<script>
    const foodData = [
        { name: "Pizza", price: 299, img: "https://source.unsplash.com/400x300/?pizza" },
        { name: "Burger", price: 149, img: "https://source.unsplash.com/400x300/?burger" },
        { name: "Pasta", price: 249, img: "https://source.unsplash.com/400x300/?pasta" },
        { name: "Sandwich", price: 129, img: "https://source.unsplash.com/400x300/?sandwich" }
    ];

    let cartCount = 0;
    const foodContainer = document.getElementById("food-items");

    foodData.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${item.img}" alt="${item.name}">
            <div class="card-content">
                <h4>${item.name}</h4>
                <p>₹${item.price}</p>
                <button onclick="addToCart()">Add to Cart</button>
            </div>
        `;
        foodContainer.appendChild(card);
    });

    function addToCart() {
        cartCount++;
        document.getElementById("cart-count").innerText = cartCount;
        alert("Item added to cart!");
    }

    function submitFeedback(event) {
        event.preventDefault();
        alert("Thank you for your feedback!");
        document.getElementById("feedbackText").value = "";
    }

    function scrollToSection(id) {
        document.getElementById(id).scrollIntoView({ behavior: "smooth" });
    }
</script>

</body>
</html>
