<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delicious Food Corner</title>

<style>

/* ===== GLOBAL STYLING ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');
    background-size: cover;
    background-position: center;
    color:white;
}

/* ===== HEADER ===== */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background:rgba(0,0,0,0.7);
}

header h1{
    color:#ffcc00;
}

nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    font-weight:bold;
}

.cart{
    margin-left:20px;
    font-weight:bold;
    color:#ffcc00;
}

/* ===== HOME SECTION ===== */
.home{
    text-align:center;
    padding:80px 20px;
}

.home h2{
    font-size:40px;
    margin-bottom:20px;
}

.call-btn{
    background:green;
    padding:12px 25px;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

/* ===== MENU SECTION ===== */
.menu{
    padding:50px;
    text-align:center;
    background:rgba(0,0,0,0.7);
}

.food-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.food-item{
    background:white;
    color:black;
    width:250px;
    margin:20px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 8px rgba(0,0,0,0.4);
}

.food-item img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.food-item h3{
    margin:10px 0;
}

.food-item button{
    background:#ff5733;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    cursor:pointer;
}

.food-item button:hover{
    background:#c70039;
}

/* ===== CONTACT SECTION ===== */
.contact{
    padding:50px;
    text-align:center;
}

.contact form{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.contact input, .contact textarea{
    width:300px;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

.contact button{
    background:#ffcc00;
    border:none;
    padding:10px 20px;
    cursor:pointer;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:20px;
    background:black;
}

</style>
</head>

<body>

<header>
    <h1>🍽 Delicious Food Corner</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#menu">Menu</a>
        <a href="#contact">Contact</a>
        <span class="cart">🛒 Cart: <span id="cart-count">0</span></span>
    </nav>
</header>

<!-- HOME -->
<section class="home" id="home">
    <h2>Fresh & Tasty Food Delivered Fast</h2>
    <button class="call-btn" onclick="callNow()">📞 Call Now</button>
</section>

<!-- MENU -->
<section class="menu" id="menu">
    <h2>Our Special Menu</h2>
    <div class="food-container">

        <div class="food-item">
            <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" alt="Pizza">
            <h3>Cheese Pizza - $10</h3>
            <button onclick="addToCart(10)">Add to Cart</button>
        </div>

        <div class="food-item">
            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Burger">
            <h3>Classic Burger - $8</h3>
            <button onclick="addToCart(8)">Add to Cart</button>
        </div>

        <div class="food-item">
            <img src="https://images.unsplash.com/photo-1525755662778-989d0524087e" alt="Pasta">
            <h3>Italian Pasta - $12</h3>
            <button onclick="addToCart(12)">Add to Cart</button>
        </div>

    </div>
</section>

<!-- CONTACT -->
<section class="contact" id="contact">
    <h2>Contact Us</h2>
    <form onsubmit="submitForm(event)">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="4" placeholder="Your Message" required></textarea>
        <button type="submit">Submit</button>
    </form>
</section>

<footer>
    © 2026 Delicious Food Corner | All Rights Reserved
</footer>

<script>

let cartCount = 0;

function addToCart(price){
    cartCount++;
    document.getElementById("cart-count").innerText = cartCount;
    alert("Item added to cart! 🛒");
}

function callNow(){
    window.location.href="tel:+1234567890";
}

function submitForm(event){
    event.preventDefault();
    alert("Thank you! Your message has been submitted.");
}

</script>

</body>
</html>
